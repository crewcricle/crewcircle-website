[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "crewcircle-auth"
version = "0.1.0"
description = "Supabase Auth + multi-tenant org helpers for CrewCircle FastAPI backends"
requires-python = ">=3.11"
dependencies = [
    "supabase>=2.0.0",
    "pydantic>=2.0.0",
    "fastapi>=0.115.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["crewcircle_auth*"]
