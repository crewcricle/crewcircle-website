[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "crewcircle-observability"
version = "0.1.0"
description = "Shared observability helpers for CrewCircle apps"
requires-python = ">=3.11"
dependencies = [
    "sentry-sdk>=2.0.0",
    "requests>=2.31.0",
    "pyyaml>=6.0.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["crewcircle_observability*"]
